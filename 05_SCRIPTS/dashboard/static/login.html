<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LJV Dashboard — Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 420px;
            width: 100%;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 14px;
            color: #666;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        button {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-submit {
            background: #667eea;
            color: white;
        }

        .btn-submit:hover:not(:disabled) {
            background: #5568d3;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e8e8e8;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #999;
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        .divider--text {
            padding: 0 12px;
        }

        .oauth-button {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .oauth-button:hover {
            background: #f9f9f9;
            border-color: #999;
        }

        .oauth-icon {
            width: 18px;
            height: 18px;
        }

        .error-message {
            padding: 12px;
            background: #fee;
            border: 1px solid #fcc;
            border-radius: 6px;
            color: #c33;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            padding: 12px;
            background: #efe;
            border: 1px solid #cfc;
            border-radius: 6px;
            color: #3c3;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .form-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab-button {
            flex: 1;
            padding: 12px 0;
            border: none;
            background: none;
            color: #999;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .form-content {
            display: none;
        }

        .form-content.active {
            display: block;
        }

        .loading {
            display: none;
        }

        .loading.show {
            display: inline-block;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #eee;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            transition: all 0.3s;
            width: 0%;
        }

        .password-strength-bar.weak {
            background: #ff6b6b;
            width: 33%;
        }

        .password-strength-bar.fair {
            background: #ffa940;
            width: 66%;
        }

        .password-strength-bar.strong {
            background: #52c41a;
            width: 100%;
        }

        .password-hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .checkbox-group label {
            margin: 0;
            font-size: 13px;
            font-weight: 400;
            text-transform: none;
            letter-spacing: normal;
            cursor: pointer;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 16px;
        }

        .forgot-password a {
            font-size: 12px;
            color: #667eea;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-password a:hover {
            color: #5568d3;
            text-decoration: underline;
        }

        .footer-text {
            font-size: 11px;
            color: #ccc;
            text-align: center;
            margin-top: 24px;
        }

        .footer-text a {
            color: #667eea;
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">LJV Engine</div>
            <p class="tagline">Control Panel</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <!-- Tabs for Login / Signup -->
        <div class="form-tabs">
            <button class="tab-button active" data-tab="login">Login</button>
            <button class="tab-button" data-tab="signup">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="form-content active">
            <div class="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" name="email" autocomplete="email" required />
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" autocomplete="current-password" required />
                </div>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="login-remember" name="remember" />
                <label for="login-remember">Remember me</label>
            </div>
            <button type="submit" class="btn-submit">
                <span id="loginButtonText">Sign In</span>
                <span class="loading" id="loginLoading"><span class="spinner"></span></span>
            </button>
            <div class="forgot-password">
                <a href="#" id="forgotPasswordBtn">Forgot password?</a>
            </div>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="form-content">
            <div class="login-form">
                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" name="email" autocomplete="email" required />
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" name="password" autocomplete="new-password" required />
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="password-hint" id="strengthHint">Password must be at least 8 characters</div>
                </div>
                <div class="form-group">
                    <label for="signup-password-confirm">Confirm Password</label>
                    <input type="password" id="signup-password-confirm" name="password_confirm" autocomplete="new-password" required />
                </div>
            </div>
            <button type="submit" class="btn-submit">
                <span id="signupButtonText">Create Account</span>
                <span class="loading" id="signupLoading"><span class="spinner"></span></span>
            </button>
        </form>

        <!-- OAuth Divider -->
        <div class="divider">
            <span class="divider--text">OR</span>
        </div>

        <!-- Google OAuth Button -->
        <button class="oauth-button" id="googleLoginBtn">
            <svg class="oauth-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign In with Google
        </button>

        <div class="footer-text">
            <p>Protected by secure authentication. Your session is encrypted.</p>
            <p style="margin-top: 8px;">
                <a href="https://github.com/ImmaBawzz/LJV_Visual_Engine" target="_blank">GitHub</a> |
                <a href="#" onclick="document.getElementById('privacyModal').style.display='block'; return false;">Privacy</a> |
                <a href="#" onclick="document.getElementById('termsModal').style.display='block'; return false;">Terms</a>
            </p>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:40px; border-radius:12px; max-width:400px; width:90%;">
            <h2 style="margin-bottom:20px; font-size:18px; color:#333;">Reset Password</h2>
            <p style="color:#666; margin-bottom:20px; font-size:14px;">Enter your email to receive password reset instructions.</p>
            <input type="email" id="resetEmail" placeholder="Enter your email" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; margin-bottom:16px;">
            <div style="display:flex; gap:12px;">
                <button class="btn-submit" style="flex:1;" id="sendResetBtn">Send Reset Link</button>
                <button class="btn-secondary" style="flex:1;" onclick="document.getElementById('forgotPasswordModal').style.display='none';">Cancel</button>
            </div>
        </div>
    </div>

    <script src=\"/static/auth-api.js\"></script>\n    <script>
        const errorEl = document.getElementById("errorMessage");
        const successEl = document.getElementById("successMessage");

        // Tab switching
        document.querySelectorAll(".tab-button").forEach((btn) => {
            btn.addEventListener("click", (e) => {
                e.preventDefault();
                const tab = btn.dataset.tab;
                document.querySelectorAll(".tab-button").forEach((b) => b.classList.remove("active"));
                document.querySelectorAll(".form-content").forEach((f) => f.classList.remove("active"));
                btn.classList.add("active");
                document.getElementById(tab + "Form").classList.add("active");
                errorEl.classList.remove("show");
                successEl.classList.remove("show");
            });
        });

        // Login Form Handler
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            errorEl.classList.remove("show");
            const email = document.getElementById("login-email").value;
            const password = document.getElementById("login-password").value;

            try {
                document.getElementById("loginLoading").classList.add("show");
                document.getElementById("loginButtonText").textContent = "";

                await authAPI.login(email, password);
                
                // Remember email if checked
                const rememberCheckbox = document.getElementById("login-remember");
                if (rememberCheckbox.checked) {
                    localStorage.setItem("ljv_remember_email", email);
                } else {
                    localStorage.removeItem("ljv_remember_email");
                }
                
                // Redirect to dashboard
                window.location.href = "/";
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.add("show");
            } finally {
                document.getElementById("loginLoading").classList.remove("show");
                document.getElementById("loginButtonText").textContent = "Sign In";
            }
        });

        // Signup Form Handler
        document.getElementById("signupForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            errorEl.classList.remove("show");
            const email = document.getElementById("signup-email").value;
            const password = document.getElementById("signup-password").value;
            const passwordConfirm = document.getElementById("signup-password-confirm").value;

            if (password !== passwordConfirm) {
                errorEl.textContent = "Passwords do not match";
                errorEl.classList.add("show");
                return;
            }

            if (password.length < 8) {
                errorEl.textContent = "Password must be at least 8 characters";
                errorEl.classList.add("show");
                return;
            }

            try {
                document.getElementById("signupLoading").classList.add("show");
                document.getElementById("signupButtonText").textContent = "";

                await authAPI.signup(email, password);
                
                // Redirect to dashboard
                window.location.href = "/";
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.add("show");
            } finally {
                document.getElementById("signupLoading").classList.remove("show");
                document.getElementById("signupButtonText").textContent = "Create Account";
            }
        });

        // Google Login Handler
        document.getElementById("googleLoginBtn").addEventListener("click", async (e) => {
            e.preventDefault();
            window.location.href = "/auth/google/authorize";
        });

        // Password Strength Meter
        document.getElementById("signup-password").addEventListener("input", (e) => {
            const password = e.target.value;
            const strengthBar = document.getElementById("strengthBar");
            const strengthHint = document.getElementById("strengthHint");
            let strength = "weak";
            let hint = "Weak password";

            if (password.length >= 8) {
                if (password.length >= 12 && /[A-Z]/.test(password) && /[0-9]/.test(password) && /[^A-Za-z0-9]/.test(password)) {
                    strength = "strong";
                    hint = "Strong password";
                } else if (password.length >= 10 && (/[A-Z]/.test(password) || /[0-9]/.test(password))) {
                    strength = "fair";
                    hint = "Fair password";
                }
            }

            strengthBar.className = `password-strength-bar ${strength}`;
            strengthHint.textContent = hint;
        });

        // Forgot Password Handler
        document.getElementById("forgotPasswordBtn").addEventListener("click", (e) => {
            e.preventDefault();
            document.getElementById("forgotPasswordModal").style.display = "block";
        });

        document.getElementById("sendResetBtn").addEventListener("click", async (e) => {
            e.preventDefault();
            const email = document.getElementById("resetEmail").value;
            if (!email) {
                alert("Please enter your email");
                return;
            }
            try {
                await authAPI.requestPasswordReset(email);
                alert("Password reset link sent to your email");
                document.getElementById("forgotPasswordModal").style.display = "none";
            } catch (err) {
                alert("Error: " + err.message);
            }
        });

        // Remember Me Functionality
        window.addEventListener("load", () => {
            const remembered = localStorage.getItem("ljv_remember_email");
            if (remembered) {
                document.getElementById("login-email").value = remembered;
                document.getElementById("login-remember").checked = true;
            }
        });

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            const rememberCheckbox = document.getElementById("login-remember");
            if (rememberCheckbox.checked) {
                localStorage.setItem("ljv_remember_email", document.getElementById("login-email").value);
            } else {
                localStorage.removeItem("ljv_remember_email");
            }
        });

        // Close modals on escape key
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                document.getElementById("forgotPasswordModal").style.display = "none";
            }
        });
    </script>
</body>
</html>
