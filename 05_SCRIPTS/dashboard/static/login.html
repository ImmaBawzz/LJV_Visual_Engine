<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LJV Dashboard — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0f1f32;
            --muted: #5b6c84;
            --surface: #ffffff;
            --surface-2: #f5f8ff;
            --line: #d4deee;
            --brand: #0f7ccf;
            --brand-2: #14a3d8;
            --danger: #bb2445;
            --ok: #157347;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background:
                radial-gradient(circle at 85% 0%, rgba(20, 163, 216, 0.22) 0%, transparent 36%),
                radial-gradient(circle at 10% 18%, rgba(15, 124, 207, 0.18) 0%, transparent 32%),
                linear-gradient(160deg, #eaf5ff 0%, #d9ebff 44%, #dbe8fa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .login-container {
            background: var(--surface);
            border-radius: 18px;
            border: 1px solid rgba(92, 124, 160, 0.2);
            box-shadow: 0 18px 44px rgba(19, 45, 78, 0.2);
            max-width: 460px;
            width: 100%;
            padding: 28px 24px 24px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--ink);
            margin-bottom: 6px;
        }

        .tagline {
            font-size: 13px;
            color: var(--muted);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--ink);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            padding: 10px 14px;
            border: 1px solid var(--line);
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.2s;
            background: var(--surface-2);
            color: var(--ink);
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(15, 124, 207, 0.14);
            background: #fff;
        }

        button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-height: 44px;
        }

        .btn-submit {
            background: linear-gradient(145deg, var(--brand), var(--brand-2));
            color: white;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(15, 124, 207, 0.28);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f2f6ff;
            color: var(--ink);
            border: 1px solid var(--line);
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e8f0ff;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--muted);
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--line);
        }

        .divider--text {
            padding: 0 12px;
        }

        .oauth-button {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fff;
            color: var(--ink);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .oauth-button:hover {
            background: #f4f8ff;
            border-color: #a8c2de;
        }

        .oauth-icon {
            width: 18px;
            height: 18px;
        }

        .error-message {
            padding: 12px;
            background: #fff0f3;
            border: 1px solid #f5bfd0;
            border-radius: 10px;
            color: var(--danger);
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            padding: 12px;
            background: #eefcf5;
            border: 1px solid #bfe7d2;
            border-radius: 10px;
            color: var(--ok);
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .form-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid #deebf8;
        }

        .tab-button {
            flex: 1;
            padding: 12px 0;
            border: none;
            background: none;
            color: #8093ac;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab-button.active {
            color: var(--brand);
            border-bottom-color: var(--brand);
        }

        .form-content {
            display: none;
        }

        .form-content.active {
            display: block;
        }

        .loading {
            display: none;
        }

        .loading.show {
            display: inline-block;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e2eaf5;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            transition: all 0.3s;
            width: 0%;
        }

        .password-strength-bar.weak {
            background: #ff6b6b;
            width: 33%;
        }

        .password-strength-bar.fair {
            background: #ffa940;
            width: 66%;
        }

        .password-strength-bar.strong {
            background: #52c41a;
            width: 100%;
        }

        .password-hint {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--brand);
        }

        .checkbox-group label {
            margin: 0;
            font-size: 13px;
            font-weight: 400;
            text-transform: none;
            letter-spacing: normal;
            cursor: pointer;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 16px;
        }

        .forgot-password a {
            font-size: 12px;
            color: var(--brand);
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-password a:hover {
            color: #0a65b0;
            text-decoration: underline;
        }

        .footer-text {
            font-size: 11px;
            color: #7088a4;
            text-align: center;
            margin-top: 24px;
        }

        .footer-text a {
            color: var(--brand);
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        .modal-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 26, 46, 0.38);
            z-index: 1000;
            backdrop-filter: blur(2px);
        }

        .modal-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 28px 22px;
            border-radius: 14px;
            border: 1px solid #d6e2f1;
            max-width: 420px;
            width: calc(100% - 24px);
            box-shadow: 0 20px 50px rgba(7, 24, 43, 0.24);
        }

        .modal-card h2 {
            margin-bottom: 12px;
            font-size: 18px;
            color: var(--ink);
        }

        .modal-card p {
            color: var(--muted);
            margin-bottom: 14px;
            font-size: 14px;
        }

        .modal-input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 10px;
            margin-bottom: 12px;
            background: var(--surface-2);
            color: var(--ink);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        @media (max-width: 640px) {
            body {
                padding: 10px;
                align-items: flex-start;
            }

            .login-container {
                margin-top: 10px;
                border-radius: 14px;
                padding: 20px 16px;
            }

            .logo {
                font-size: 28px;
            }

            .modal-card {
                padding: 20px 14px;
                width: calc(100% - 16px);
            }

            .modal-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">LJV Engine</div>
            <p class="tagline">Control Panel</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <!-- Tabs for Login / Signup -->
        <div class="form-tabs">
            <button class="tab-button active" data-tab="login">Login</button>
            <button class="tab-button" data-tab="signup">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="form-content active">
            <div class="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" name="email" autocomplete="email" required />
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" autocomplete="current-password" required />
                </div>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="login-remember" name="remember" />
                <label for="login-remember">Remember me</label>
            </div>
            <button type="submit" class="btn-submit">
                <span id="loginButtonText">Sign In</span>
                <span class="loading" id="loginLoading"><span class="spinner"></span></span>
            </button>
            <div class="forgot-password">
                <a href="#" id="forgotPasswordBtn">Forgot password?</a>
            </div>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="form-content">
            <div class="login-form">
                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" name="email" autocomplete="email" required />
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" name="password" autocomplete="new-password" required />
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="password-hint" id="strengthHint">Password must be at least 8 characters</div>
                </div>
                <div class="form-group">
                    <label for="signup-password-confirm">Confirm Password</label>
                    <input type="password" id="signup-password-confirm" name="password_confirm" autocomplete="new-password" required />
                </div>
            </div>
            <button type="submit" class="btn-submit">
                <span id="signupButtonText">Create Account</span>
                <span class="loading" id="signupLoading"><span class="spinner"></span></span>
            </button>
        </form>

        <!-- OAuth Divider -->
        <div class="divider">
            <span class="divider--text">OR</span>
        </div>

        <!-- Google OAuth Button -->
        <button class="oauth-button" id="googleLoginBtn">
            <svg class="oauth-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign In with Google
        </button>

        <div class="footer-text">
            <p>Protected by secure authentication. Your session is encrypted.</p>
            <p style="margin-top: 8px;">
                <a href="https://github.com/ImmaBawzz/LJV_Visual_Engine" target="_blank">GitHub</a> |
                <a href="#" onclick="document.getElementById('privacyModal').style.display='block'; return false;">Privacy</a> |
                <a href="#" onclick="document.getElementById('termsModal').style.display='block'; return false;">Terms</a>
            </p>
            <p style="margin-top: 8px;">Build 2026.04.01a</p>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal-backdrop">
        <div class="modal-card">
            <h2>Reset Password</h2>
            <p id="resetInstructions">Enter your email to receive password reset instructions.</p>
            <input type="email" id="resetEmail" class="modal-input" placeholder="Enter your email">
            <input type="text" id="resetToken" class="modal-input" placeholder="Paste reset token" style="display:none;">
            <input type="password" id="resetNewPassword" class="modal-input" placeholder="Enter new password" style="display:none;">
            <input type="password" id="resetConfirmPassword" class="modal-input" placeholder="Confirm new password" style="display:none;">
            <p id="resetStatus" style="display:none; margin-bottom:12px; font-size:13px;"></p>
            <div class="modal-actions">
                <button class="btn-submit" id="sendResetBtn">Send Reset Link</button>
                <button class="btn-secondary" onclick="document.getElementById('forgotPasswordModal').style.display='none';">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/static/auth-api.js?v=20260401a"></script>
    <script>
        const errorEl = document.getElementById("errorMessage");
        const successEl = document.getElementById("successMessage");

        // Tab switching
        document.querySelectorAll(".tab-button").forEach((btn) => {
            btn.addEventListener("click", (e) => {
                e.preventDefault();
                const tab = btn.dataset.tab;
                document.querySelectorAll(".tab-button").forEach((b) => b.classList.remove("active"));
                document.querySelectorAll(".form-content").forEach((f) => f.classList.remove("active"));
                btn.classList.add("active");
                document.getElementById(tab + "Form").classList.add("active");
                errorEl.classList.remove("show");
                successEl.classList.remove("show");
            });
        });

        // Login Form Handler
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            errorEl.classList.remove("show");
            const email = document.getElementById("login-email").value;
            const password = document.getElementById("login-password").value;

            try {
                document.getElementById("loginLoading").classList.add("show");
                document.getElementById("loginButtonText").textContent = "";

                await authAPI.login(email, password);
                
                // Remember email if checked
                const rememberCheckbox = document.getElementById("login-remember");
                if (rememberCheckbox.checked) {
                    localStorage.setItem("ljv_remember_email", email);
                } else {
                    localStorage.removeItem("ljv_remember_email");
                }
                
                // Redirect to dashboard
                window.location.href = "/";
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.add("show");
            } finally {
                document.getElementById("loginLoading").classList.remove("show");
                document.getElementById("loginButtonText").textContent = "Sign In";
            }
        });

        // Signup Form Handler
        document.getElementById("signupForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            errorEl.classList.remove("show");
            const email = document.getElementById("signup-email").value;
            const password = document.getElementById("signup-password").value;
            const passwordConfirm = document.getElementById("signup-password-confirm").value;

            if (password !== passwordConfirm) {
                errorEl.textContent = "Passwords do not match";
                errorEl.classList.add("show");
                return;
            }

            if (password.length < 8) {
                errorEl.textContent = "Password must be at least 8 characters";
                errorEl.classList.add("show");
                return;
            }

            try {
                document.getElementById("signupLoading").classList.add("show");
                document.getElementById("signupButtonText").textContent = "";

                await authAPI.signup(email, password);
                
                // Redirect to dashboard
                window.location.href = "/";
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.add("show");
            } finally {
                document.getElementById("signupLoading").classList.remove("show");
                document.getElementById("signupButtonText").textContent = "Create Account";
            }
        });

        // Google Login Handler
        document.getElementById("googleLoginBtn").addEventListener("click", async (e) => {
            e.preventDefault();
            window.location.href = "/auth/google/authorize";
        });

        // Password Strength Meter
        document.getElementById("signup-password").addEventListener("input", (e) => {
            const password = e.target.value;
            const strengthBar = document.getElementById("strengthBar");
            const strengthHint = document.getElementById("strengthHint");
            let strength = "weak";
            let hint = "Weak password";

            if (password.length >= 8) {
                if (password.length >= 12 && /[A-Z]/.test(password) && /[0-9]/.test(password) && /[^A-Za-z0-9]/.test(password)) {
                    strength = "strong";
                    hint = "Strong password";
                } else if (password.length >= 10 && (/[A-Z]/.test(password) || /[0-9]/.test(password))) {
                    strength = "fair";
                    hint = "Fair password";
                }
            }

            strengthBar.className = `password-strength-bar ${strength}`;
            strengthHint.textContent = hint;
        });

        // Forgot Password Handler
        document.getElementById("forgotPasswordBtn").addEventListener("click", (e) => {
            e.preventDefault();
            document.getElementById("forgotPasswordModal").style.display = "block";
        });

        document.getElementById("sendResetBtn").addEventListener("click", async (e) => {
            e.preventDefault();
            const token = document.getElementById("resetToken").value.trim();
            const statusEl = document.getElementById("resetStatus");

            statusEl.style.display = "none";

            if (token) {
                const newPassword = document.getElementById("resetNewPassword").value;
                const confirmPassword = document.getElementById("resetConfirmPassword").value;

                if (newPassword.length < 8) {
                    alert("Password must be at least 8 characters");
                    return;
                }

                if (newPassword !== confirmPassword) {
                    alert("Passwords do not match");
                    return;
                }

                try {
                    await authAPI.resetPassword(token, newPassword);
                    statusEl.textContent = "Password reset successful. You can now sign in.";
                    statusEl.style.color = "#047857";
                    statusEl.style.display = "block";
                    document.getElementById("resetNewPassword").value = "";
                    document.getElementById("resetConfirmPassword").value = "";
                    window.history.replaceState({}, document.title, "/login.html");
                } catch (err) {
                    statusEl.textContent = "Password reset failed: " + err.message;
                    statusEl.style.color = "#b91c1c";
                    statusEl.style.display = "block";
                }
                return;
            }

            const email = document.getElementById("resetEmail").value;
            if (!email) {
                alert("Please enter your email");
                return;
            }
            try {
                await authAPI.requestPasswordReset(email);
                statusEl.textContent = "If the email exists, reset instructions were sent.";
                statusEl.style.color = "#1d4ed8";
                statusEl.style.display = "block";
            } catch (err) {
                alert("Error: " + err.message);
            }
        });

        // Remember Me Functionality
        window.addEventListener("load", () => {
            const remembered = localStorage.getItem("ljv_remember_email");
            if (remembered) {
                document.getElementById("login-email").value = remembered;
                document.getElementById("login-remember").checked = true;
            }

            const params = new URLSearchParams(window.location.search);
            const resetToken = params.get("reset_token");
            if (resetToken) {
                document.getElementById("forgotPasswordModal").style.display = "block";
                document.getElementById("resetInstructions").textContent = "Enter your new password to complete reset.";
                document.getElementById("resetToken").style.display = "block";
                document.getElementById("resetToken").value = resetToken;
                document.getElementById("resetToken").readOnly = true;
                document.getElementById("resetNewPassword").style.display = "block";
                document.getElementById("resetConfirmPassword").style.display = "block";
                document.getElementById("sendResetBtn").textContent = "Reset Password";
            }
        });

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            const rememberCheckbox = document.getElementById("login-remember");
            if (rememberCheckbox.checked) {
                localStorage.setItem("ljv_remember_email", document.getElementById("login-email").value);
            } else {
                localStorage.removeItem("ljv_remember_email");
            }
        });

        // Close modals on escape key
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                document.getElementById("forgotPasswordModal").style.display = "none";
            }
        });
    </script>
</body>
</html>
